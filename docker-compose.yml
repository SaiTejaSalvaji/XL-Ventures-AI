version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      # GCP Project
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      # Firestore
      - FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID:-(default)}
      # Google Cloud Storage
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-}
      # Vertex AI
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-1.5-pro}
      # API server
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8084
      - DEBUG=${DEBUG:-True}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    volumes:
      # Mount GCP Application Default Credentials if present locally
      - ${APPDATA:-~}/.config/gcloud:/root/.config/gcloud:ro
      # Persist local mock data
      - ./backend/local_db:/app/local_db
      - ./backend/local_storage:/app/local_storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8084}
    depends_on:
      - backend
    restart: unless-stopped
